name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: wassimoz/devsecops-project   

jobs:


  sast-scan:
    name: "Secrets & Static Analysis"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — detect secrets in git history
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: pip install bandit safety

      - name: Bandit — static code analysis
        run: |
          bandit -r app/ \
            -f json \
            -o bandit-report.json \
            -ll \
            --exclude app/tests
          echo "Bandit scan complete"

      - name: Safety CLI — check known CVEs in dependencies
        run: |
          safety check -r app/requirements.txt --json > safety-report.json || true
          echo "Safety scan complete"

      - name: Upload SAST reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 14


  build-scan:
    name: "Build & Container Security"
    runs-on: ubuntu-latest
    needs: sast-scan
    permissions:
      contents: read
      security-events: write   

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REPO_USER }}
          password: ${{ secrets.PWD }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            ./app

      - name: Trivy — scan container for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      
      - name: Push image to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest


  dast-scan:
    name: "DAST — OWASP ZAP"
    runs-on: ubuntu-latest
    needs: build-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REPO_USER }}
          password: ${{ secrets.PWD }}

      - name: Start application container
        run: |
          docker run -d \
            --name test-app \
            -p 5000:5000 \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for app to be healthy
        run: |
          echo "Waiting for app to start..."
          for i in {1..15}; do
            if curl -sf http://localhost:5000/health; then
              echo "App is ready"
              break
            fi
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done

      - name: OWASP ZAP — baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:5000"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-I"

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
          retention-days: 14

      - name: Stop and remove test container
        if: always()
        run: docker stop test-app && docker rm test-app